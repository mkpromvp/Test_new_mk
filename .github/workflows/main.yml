name: Test SF Upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Create Fake ZIP
        run: |
          echo "AxionOS gta4l test file" > test.tx
          zip AxionOS-TEST-gta4l.zip test.txt

      - name: Setup SSH
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to SourceForge
        run: |
          eval $(ssh-agent -s)
          echo "${{ secrets.SF_PRIVATE_KEY }}" | base64 -d | tr -d '\r' | ssh-add -
          
          rsync -avP \
            -e "ssh -o StrictHostKeyChecking=no" \
            "AxionOS-TEST-gta4l.zip" \
            "mkpromvp@frs.sourceforge.net:/home/frs/project/gta4l-builds/"
          
          echo "✅ Done!"
          echo "🔗 https://sourceforge.net/projects/gta4l-builds/files/"

      - name: Upload to SourceForge
        run: |
          rsync -avP \
            -e "ssh -i ~/.ssh/sf_key -o StrictHostKeyChecking=no" \
            "AxionOS-TEST-gta4l.zip" \
            "mkpromvp@frs.sourceforge.net:/home/frs/project/gta4l-builds/"
          echo "✅ Done!"
          echo "🔗 https://sourceforge.net/projects/gta4l-builds/files/"
