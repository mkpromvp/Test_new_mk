name: Test SF Upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Debug Key
        env:
          SF_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: |
          echo "${SF_KEY}" > ~/.ssh/sf_key_test
          echo "--- عدد الأسطر ---"
          wc -l ~/.ssh/sf_key_test
          echo "--- أول سطر ---"
          head -1 ~/.ssh/sf_key_test
          echo "--- آخر سطر ---"
          tail -1 ~/.ssh/sf_key_test
          echo "--- الحجم ---"
          wc -c ~/.ssh/sf_key_test
