name: Test SF Upload

on:
  workflow_dispatch:

jobs:
  test-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Fake ZIP
        run: echo "AxionOS gta4l test file" > AxionOS-TEST-gta4l.zip

      - name: Upload to SourceForge
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          switches: -avP
          path: AxionOS-TEST-gta4l.zip
          remote_path: /home/frs/project/gta4l-builds/
          remote_host: frs.sourceforge.net
          remote_user: mkpromvp
          remote_key: ${{ secrets.SF_PRIVATE_KEY }}
